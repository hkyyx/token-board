name: Token Board
description: Collect AI token usage and update profile heatmap SVG
inputs:
  days:
    description: Number of days to collect and display (7-365)
    required: false
    default: "365"
  config:
    description: Path to token-board config file
    required: false
    default: ""
runs:
  using: node20
  main: ../../action/dist/index.js
